# Mosquitto broker configuration for mTLS integration tests.
# Mounted into the container via docker-compose.

# Disable anonymous access
allow_anonymous false

# ACL file — restricts each client to its own topic subtree
acl_file /mosquitto/config/acl

# TLS listener on port 8883
listener 8883
cafile /mosquitto/certs/ca.pem
certfile /mosquitto/certs/server.pem
keyfile /mosquitto/certs/server.key
require_certificate true
use_identity_as_username true
tls_version tlsv1.2

# Plain TCP listener on port 1883 (for non-TLS tests)
listener 1883
