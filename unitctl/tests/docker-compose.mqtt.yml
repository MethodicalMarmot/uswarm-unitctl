services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "18883:8883"
      - "11883:1883"
    volumes:
      - ./fixtures/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./fixtures/certs/ca.pem:/mosquitto/certs/ca.pem:ro
      - ./fixtures/certs/server.pem:/mosquitto/certs/server.pem:ro
      - ./fixtures/certs/server.key:/mosquitto/certs/server.key:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 -p 1883 || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s
